<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitor Comments | Unifiedfarm BLM</title>
<meta name="description" content="Share your experience with Unifiedfarm BLM. Leave a comment and help other farmers discover quality poultry products.">
<style>:root{--bg:#FEFAE0;--alt:#E9EDC9;--surf:#FAEDCD;--t:#283618;--m:#606C38;--a:#BC6C25;--sec:#606C38;--b:#DDA15E}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Georgia,serif;background:var(--bg);color:var(--t);line-height:1.7}.w{max-width:800px;margin:0 auto;padding:0 20px}nav{background:var(--alt);padding:12px 0}nav .w{display:flex;align-items:center;justify-content:space-between}nav a{color:var(--t);text-decoration:none;font-size:14px;font-family:system-ui}.l{font-weight:bold;font-size:18px}.h{background:var(--alt);padding:60px 0 40px}.h h1{font-size:42px;margin-bottom:8px}.e{font-family:system-ui;font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--a);font-weight:600}.c{padding:40px 0}.btn{font-family:system-ui;font-size:13px;font-weight:600;padding:10px 20px;border-radius:12px;border:none;cursor:pointer;background:var(--sec);color:var(--bg)}.btn:hover{opacity:.9}.card{background:var(--surf);border-radius:16px;padding:20px;margin:12px 0}.card h4{font-family:system-ui;font-size:14px;color:var(--t)}.card p{font-size:14px;color:var(--m);margin-top:6px}.card .date{font-family:system-ui;font-size:11px;color:var(--m);margin-top:4px}.modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(40,54,24,.4)}.modal.active{display:flex}.modal-box{background:var(--bg);border-radius:20px;padding:24px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto}input,textarea{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--b);background:var(--bg);color:var(--t);font-family:system-ui;font-size:14px;margin-top:6px}label{font-family:system-ui;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--m);font-weight:600}.x{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--m)}footer{background:var(--t);color:rgba(254,250,224,.6);padding:30px 0;margin-top:60px;font-family:system-ui;font-size:13px;text-align:center}footer a{color:rgba(254,250,224,.6);text-decoration:none;margin:0 8px}.init{font-family:system-ui;font-size:12px;width:36px;height:36px;border-radius:50%;background:var(--sec);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
<nav><div class="w"><a href="/" class="l">&#127807; Unifiedfarm BLM</a><a href="/" style="font-family:system-ui;font-size:14px">&larr; Back to Home</a></div></nav>

<section class="h"><div class="w"><span class="e">Guestbook</span><h1>Visitor Comments</h1><p style="color:var(--m)">We love hearing from our community. Share your experience with Unifiedfarm BLM.</p></div></section>

<section class="c"><div class="w">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
<span id="count" style="font-family:system-ui;font-size:14px;color:var(--m)">0 comments</span>
<button class="btn" onclick="openModal()">+ Add Comment</button>
</div>
<div id="comments"></div>
</div></section>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
<div class="modal-box">
<button class="x" onclick="closeModal()">&times;</button>
<h2 style="margin-bottom:16px">Leave a Comment</h2>
<form onsubmit="submitComment(event)">
<div style="margin-bottom:12px"><label>Your Name</label><input type="text" id="name" required placeholder="John Doe"></div>
<div style="margin-bottom:12px"><label>Email</label><input type="email" id="email" required placeholder="john@example.com"></div>
<div style="margin-bottom:16px"><label>Your Comment</label><textarea id="comment" rows="4" required placeholder="Share your experience..."></textarea></div>
<button type="submit" class="btn" style="width:100%">Submit Comment</button>
</form>
</div>
</div>

<footer><div class="w"><a href="/privacy/">Privacy Policy</a>|<a href="/terms/">Terms of Service</a>|<a href="/cookies/">Cookie Policy</a><p style="margin-top:10px">&copy; 2026 Unifiedfarm BLM</p></div></footer>

<script>
const KEY='ufb-comments';
const DEFAULT=[
{id:1,name:'Sarah Nakanwagi',email:'sarah@example.com',comment:'I bought 50 day-old chicks from Unifiedfarm BLM and they are all doing great! The quality is amazing. Thank you so much for the healthy birds.',createdAt:'2026-06-20T10:00:00.000Z'},
{id:2,name:'John Mukasa',email:'john@example.com',comment:'The fresh organic eggs are the best I have ever tasted. My customers love them. I order 10 trays every week without fail.',createdAt:'2026-06-22T14:30:00.000Z'},
{id:3,name:'Grace Akello',email:'grace@example.com',comment:'I visited the farm in Mpigi and was impressed by how clean and well-organized everything is. The team is very knowledgeable and helpful.',createdAt:'2026-06-25T09:15:00.000Z'}
];
function getComments(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):DEFAULT}catch(e){return DEFAULT}}
function saveComments(c){localStorage.setItem(KEY,JSON.stringify(c));renderComments();}
function renderComments(){const comments=getComments();document.getElementById('count').textContent=comments.length+' comment'+(comments.length!==1?'s':'');document.getElementById('comments').innerHTML=comments.map(c=>`<div class="card"><div style="display:flex;align-items:center;gap:10px"><div class="init">${c.name.charAt(0).toUpperCase()}</div><div><h4>${c.name}</h4><div class="date">${new Date(c.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div></div><p>${c.comment}</p></div>`).join('');}
function openModal(){document.getElementById('modal').classList.add('active');}
function closeModal(){document.getElementById('modal').classList.remove('active');}
function submitComment(e){e.preventDefault();const c={id:Date.now(),name:document.getElementById('name').value,email:document.getElementById('email').value,comment:document.getElementById('comment').value,createdAt:new Date().toISOString()};const all=[c,...getComments()];saveComments(all);closeModal();document.getElementById('name').value='';document.getElementById('email').value='';document.getElementById('comment').value='';alert('Comment submitted! Thank you.');}
renderComments();
</script>
</body></html>
